name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Existing tag/ref to build and publish to PyPI (e.g. v0.1.0.dev1). PyPI only — does NOT create a GitHub Release or Zenodo deposit. Leave blank for a normal tag-triggered release."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # provenance OIDC
      attestations: write   # actions/attest-build-provenance + attest-sbom
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
          pip install cyclonedx-bom
      - name: Build sdist + wheel
        run: python -m build
      - name: Generate CycloneDX SBOM
        run: cyclonedx-py requirements -o sbom.cdx.json <(pip freeze)
      - name: Provenance attestation (dist)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: "dist/*"
      - name: SBOM attestation (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-path: "dist/*"
          sbom-path: "sbom.cdx.json"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts
          path: |
            dist/*
            sbom.cdx.json

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # PyPI Trusted Publishing OIDC
    environment:
      name: pypi
      url: https://pypi.org/project/groupoid/
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: .
      - name: Publish to PyPI (Trusted Publishing, OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist
          print-hash: true

  sign-and-release:
    needs: build
    # Only on a real tag push — a manual workflow_dispatch (used to publish an
    # already-released tag to PyPI) must NOT create a duplicate GitHub Release
    # or trigger a second Zenodo deposit.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub Release
      id-token: write       # Sigstore signing OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: .
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: |
            dist/*.tar.gz
            dist/*.whl
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom.cdx.json
            *.sigstore.json
